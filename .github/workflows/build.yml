name: AD1 ERP Build

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

    - name: Download Code
      uses: actions/checkout@v4


    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20


    - name: Install Dependencies
      run: npm install


    - name: Check Project
      run: npm run build
