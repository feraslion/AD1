name: ERP Development Workflow

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

  workflow_dispatch:


env:
  NODE_VERSION: 22


jobs:

# =========================
# 1 - Code Quality Check
# =========================

  code-quality:

    name: Code Quality
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm


      - name: Install Packages
        run: npm ci


      - name: Lint Check
        run: npm run lint



# =========================
# 2 - Build Application
# =========================

  build:

    name: Build ERP System
    needs: code-quality
    runs-on: ubuntu-latest


    steps:

      - uses: actions/checkout@v4


      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}


      - name: Install Dependencies
        run: npm ci


      - name: Build Frontend
        run: npm run build



# =========================
# 3 - Database Migration
# =========================

  database:

    name: Database Migration Test
    needs: build
    runs-on: ubuntu-latest


    services:

      postgres:

        image: postgres:16

        env:

          POSTGRES_USER: erp
          POSTGRES_PASSWORD: erp_password
          POSTGRES_DB: erp_database


        ports:

          - 5432:5432


        options:

          >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5



    steps:

      - uses: actions/checkout@v4


      - uses: actions/setup-node@v4
        with:

          node-version: ${{ env.NODE_VERSION }}


      - name: Install
        run: npm ci


      - name: Run Database Migration
        run: npm run db:migrate

        env:

          DATABASE_URL:
            postgresql://erp:erp_password@localhost:5432/erp_database



# =========================
# 4 - Automated Testing
# =========================


  testing:


    name: ERP Tests

    needs: database

    runs-on: ubuntu-latest



    steps:


      - uses: actions/checkout@v4


      - uses: actions/setup-node@v4

        with:

          node-version: ${{ env.NODE_VERSION }}



      - name: Install

        run: npm ci



      - name: Run Tests

        run: npm test




# =========================
# 5 - Deployment Ready
# =========================


  release:


    name: Production Ready

    needs: testing

    runs-on: ubuntu-latest



    steps:


      - name: Success

        run: |

          echo "ERP Build Completed Successfully"

          echo "Ready For Deployment"
