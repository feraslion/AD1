name: AD1 ERP CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main


jobs:

  install-and-check:

    name: Install & Type Check

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4


      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:
          node-version: 20
          cache: npm


      - name: Install Dependencies

        run: npm install


      - name: TypeScript Check

        run: npm run lint



  build:

    name: Build ERP Application

    needs: install-and-check

    runs-on: ubuntu-latest


    steps:

      - name: Checkout Code

        uses: actions/checkout@v4


      - name: Setup Node.js

        uses: actions/setup-node@v4

        with:
          node-version: 20
          cache: npm


      - name: Install Dependencies

        run: npm install


      - name: Build Project

        run: npm run build



  success:

    name: Build Completed

    needs: build

    runs-on: ubuntu-latest


    steps:

      - name: Status

        run: echo "AD1 ERP Build Successful"
